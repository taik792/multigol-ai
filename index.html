<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<title>Multigol AI Scanner</title>

<style>

body{
    font-family:Arial;
    background:linear-gradient(#0f172a,#1e3a8a);
    color:white;
    text-align:center;
    padding:40px;
}

h1{
    margin-bottom:40px;
}

.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:25px;
}

.card{
    background:#1e293b;
    padding:25px;
    width:320px;
    border-radius:14px;
    box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.league{
    font-size:13px;
    color:#9ca3af;
    margin-bottom:10px;
}

.prob{
    margin-top:10px;
    font-weight:bold;
    color:#22c55e;
}

</style>

</head>


<body>

<h1>⚽ Multigol AI Scanner</h1>

<div id="matches" class="container">

Caricamento partite...

</div>


<script>

fetch("predictions.json")

.then(response=>response.json())

.then(data=>{

const container=document.getElementById("matches");

container.innerHTML="";

if(data.length===0){

container.innerHTML="Nessuna partita trovata";

return;

}

data.forEach(match=>{

const card=document.createElement("div");

card.className="card";

card.innerHTML=`

<h2>${match.home} vs ${match.away}</h2>

<div class="league">${match.league}</div>

<p><b>Combo:</b> ${match.combo}</p>

<p><b>Multigol Casa:</b> ${match.multigol_home}</p>

<p><b>Multigol Ospite:</b> ${match.multigol_away}</p>

<p><b>Over 2.5:</b> ${match.over25}</p>

<p><b>BTTS:</b> ${match.btts}</p>

<div class="prob">Probabilità: ${match.probability}%</div>

`;

container.appendChild(card);

});

})

.catch(error=>{

document.getElementById("matches").innerHTML="Errore caricamento dati";

});

</script>

</body>
</html>
