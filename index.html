<script>
fetch("output/predictions.json")
.then(r => r.json())
.then(data => {

const container = document.getElementById("matches")

if(data.length === 0){
container.innerHTML = "<p style='color:red'>Nessuna partita trovata</p>"
return
}

data.forEach(m => {

container.innerHTML += `
<div class="card">
<h3>${m.home} vs ${m.away}</h3>
<p>Multigol: ${m.multigol}</p>
<p>${m.over_under}</p>
<p>BTTS: ${m.btts}</p>
</div>
`

})

})
</script>
