<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Multigol AI Scanner</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:30px;
}

.card{
background:#1e1e1e;
padding:20px;
border-radius:10px;
width:260px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.team{
font-size:18px;
font-weight:bold;
margin-bottom:5px;
}

.league{
color:#aaa;
margin-bottom:10px;
}

.time{
color:#0ff;
margin-bottom:10px;
}

.stat{
margin:4px 0;
}

.prob{
margin-top:10px;
font-weight:bold;
color:#00ff90;
}

</style>

</head>

<body>

<h1>Multigol AI Scanner</h1>

<div class="container" id="matches"></div>

<script>

fetch("data/predictions.json")
.then(response => response.json())
.then(data => {

const container = document.getElementById("matches")

if(data.length === 0){
container.innerHTML = "<h2>Nessuna partita trovata</h2>"
return
}

data.forEach(match => {

const card = document.createElement("div")
card.className = "card"

card.innerHTML = `

<div class="team">
${match.home} vs ${match.away}
</div>

<div class="league">
${match.country} • ${match.league}
</div>

<div class="time">
${match.time}
</div>

<div class="stat">
Combo: ${match.combo}
</div>

<div class="stat">
Multigol Casa: ${match.multigol_home}
</div>

<div class="stat">
Multigol Ospite: ${match.multigol_away}
</div>

<div class="stat">
Over 2.5: ${match.over25}
</div>

<div class="stat">
BTTS: ${match.btts}
</div>

<div class="prob">
Probabilità: ${match.probability}%
</div>

`

container.appendChild(card)

})

})

</script>

</body>
</html>
