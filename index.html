<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Multigol AI Scanner</title>

<style>

body{
background:#0b1d3a;
font-family:Arial;
color:white;
text-align:center;
margin:0;
padding:0;
}

h1{
margin-top:30px;
font-size:32px;
}

#matches{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.card{

background:#1c2e4a;

padding:20px;

border-radius:15px;

width:280px;

box-shadow:0 5px 15px rgba(0,0,0,0.4);

}

.card h3{
margin:0;
font-size:18px;
}

.league{
color:#9fb3d1;
font-size:14px;
margin-top:5px;
}

.time{
color:#33d1ff;
font-weight:bold;
margin:10px 0;
}

.stat{
margin:4px 0;
}

.prob{
color:#00ff90;
font-size:18px;
font-weight:bold;
margin-top:10px;
}

</style>

</head>

<body>

<h1>⚽ Multigol AI Scanner</h1>

<div id="matches">

Caricamento partite...

</div>

<script>

fetch("data/predictions.json")

.then(response => response.json())

.then(data => {

let container = document.getElementById("matches")

container.innerHTML = ""

if(data.length === 0){

container.innerHTML = "<h2>Nessuna partita trovata</h2>"

return

}

data.forEach(m => {

let card = document.createElement("div")

card.className = "card"

card.innerHTML = `

<h3>${m.home} vs ${m.away}</h3>

<div class="league">${m.country} • ${m.league}</div>

<div class="time">⏰ ${m.time}</div>

<div class="stat">Over 2.5: ${m.over25}%</div>

<div class="stat">BTTS: ${m.btts}%</div>

<div class="prob">Probabilità: ${m.probability}%</div>

`

container.appendChild(card)

})

})

.catch(error => {

document.getElementById("matches").innerHTML = "Errore caricamento partite"

})

</script>

</body>

</html>
