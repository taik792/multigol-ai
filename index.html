<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Multigol AI</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:#33ff99;
}

table{
width:90%;
margin:auto;
border-collapse:collapse;
margin-top:30px;
}

th{
background:#33ff99;
color:black;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid #444;
}

.loading{
margin-top:40px;
font-size:20px;
color:#33ff99;
}

</style>

</head>


<body>

<h1>⚽ MULTIGOL AI</h1>
<p>Pronostici aggiornati automaticamente</p>

<div id="loading" class="loading">
Caricamento partite...
</div>

<table id="table" style="display:none">

<thead>

<tr>

<th>Data</th>
<th>Partita</th>
<th>Campionato</th>
<th>Expected Goals</th>
<th>Multigol</th>
<th>Confidenza</th>

</tr>

</thead>

<tbody id="matches"></tbody>

</table>


<script>

fetch("output/multigol_predictions.json")

.then(response => response.json())

.then(data => {

document.getElementById("loading").style.display="none";
document.getElementById("table").style.display="table";

let table = document.getElementById("matches");

data.forEach(match => {

let rawDate = match.date;

// corregge formato data
let date = new Date(rawDate.replace(" ", "T"));

let formattedDate =
date.toLocaleDateString('it-IT') + " " +
date.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});

let row = `
<tr>

<td>${formattedDate}</td>
<td>${match.match}</td>
<td>${match.league}</td>
<td>${match.expected_goals}</td>
<td>${match.multigol}</td>
<td>${match.confidence}%</td>

</tr>
`;

table.innerHTML += row;

});

})

.catch(error => {

document.getElementById("loading").innerHTML =
"Errore nel caricamento dati";

});

</script>

</body>

</html>
