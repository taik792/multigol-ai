<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Multigol AI Scanner PRO</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(180deg, #0f2a44, #123d5c);
      color: white;
      text-align: center;
    }

    h1 {
      padding: 20px;
    }

    .section {
      margin: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      margin: 10px auto;
      padding: 15px;
      width: 80%;
      border-radius: 10px;
    }

    .top {
      background: rgba(255,140,0,0.2);
    }

    .loader {
      margin-top: 50px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h1>⚽ Multigol AI Scanner PRO</h1>

<div class="section">
  <h2>🔥 Top Picks</h2>
  <div id="top-picks">Caricamento...</div>
</div>

<div class="section">
  <h2>📊 Tutte le partite</h2>
  <div id="all-matches"></div>
</div>

<script>
async function loadPredictions() {
  try {
    // 🔥 NO CACHE (FIX PRINCIPALE)
    const url = "data/predictions.json?v=" + new Date().getTime();

    const response = await fetch(url);
    const data = await response.json();

    console.log("DATI JSON:", data);

    const topDiv = document.getElementById("top-picks");
    const allDiv = document.getElementById("all-matches");

    topDiv.innerHTML = "";
    allDiv.innerHTML = "";

    // 🔥 TOP PICKS
    data.top.forEach(match => {
      topDiv.innerHTML += `
        <div class="card top">
          <strong>${match.home} vs ${match.away}</strong><br>
          🏆 ${match.league || ""} <br>
          📅 ${match.date || ""}<br>
          👉 ${match.pick}
        </div>
      `;
    });

    // 🔥 TUTTE LE PARTITE
    data.all.forEach(match => {
      allDiv.innerHTML += `
        <div class="card">
          <strong>${match.home} vs ${match.away}</strong><br>
          🏆 ${match.league || ""}<br>
          📅 ${match.date || ""}<br>
          👉 ${match.pick}
        </div>
      `;
    });

  } catch (err) {
    console.error("ERRORE:", err);
    document.getElementById("top-picks").innerHTML = "Errore caricamento dati";
  }
}

// 🔁 AUTO REFRESH ogni 60 sec
setInterval(loadPredictions, 60000);

// 🚀 LOAD iniziale
loadPredictions();
</script>

</body>
</html>
