<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Multigol AI Scanner</title>

<style>

body{
background:#0f2747;
font-family:Arial;
color:white;
text-align:center;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#163a63;
padding:20px;
border-radius:10px;
}

.green{
color:#00ff9c;
font-weight:bold;
}

</style>

</head>

<body>

<h1>⚽ Multigol AI Scanner</h1>

<div class="container" id="matches"></div>

<script>

fetch("data/predictions.json")
.then(res => res.json())
.then(data => {

const container=document.getElementById("matches")

data.forEach(m=>{

container.innerHTML+=`

<div class="card">

<h3>${m.home} vs ${m.away}</h3>

<p>${m.league}</p>

<p>🎯 Multigol: <b>${m.multigol}</b></p>

<p>🏠 Casa multigol: <b>${m.multigol_home}</b></p>

<p>✈️ Ospite multigol: <b>${m.multigol_away}</b></p>

<p>📈 Over 2.5: ${m.over25}%</p>

<p>🤝 BTTS: ${m.btts}%</p>

<p class="green">Probabilità: ${m.probability}%</p>

</div>

`

})

})

</script>

</body>

</html>
