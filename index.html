<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Multigol AI Scanner</title>

<style>

body{
background:#0f2742;
font-family:Arial;
color:white;
text-align:center;
}

h1{
margin-top:30px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:30px;
}

.card{

background:#1f3f63;
border-radius:12px;
padding:20px;
margin:15px;
width:260px;

box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.card h3{
margin-top:0;
}

.prob{
color:#00ff9c;
font-weight:bold;
}

</style>

</head>

<body>

<h1>⚽ Multigol AI Scanner</h1>

<div id="matches" class="container"></div>

<script>

fetch("data/predictions.json")
.then(response => response.json())
.then(data => {

const container = document.getElementById("matches");

data.slice(0,30).forEach(match => {

const card = document.createElement("div");
card.className = "card";

card.innerHTML = `

<h3>${match.home} vs ${match.away}</h3>

<p>${match.country} - ${match.league}</p>

<p>📅 ${match.date} 🕒 ${match.time}</p>

<p>🎯 Multigol: ${match.multigol}</p>

<p>🏠 Casa multigol: ${match.home_multigol}</p>

<p>✈️ Ospite multigol: ${match.away_multigol}</p>

<p>⬆️ Over 2.5: ${match.over25}%</p>

<p>🤝 BTTS: ${match.btts}%</p>

<p class="prob">Probabilità: ${match.probability}%</p>

`;

container.appendChild(card);

});

})
.catch(err => {

console.log(err);

});

</script>

</body>

</html>
