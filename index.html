<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Multigol AI Scanner PRO</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(#0f2a3f, #123a56);
    color: white;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
}

.section {
    margin-top: 30px;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
}

</style>
</head>

<body>

<h1>⚽ Multigol AI Scanner PRO</h1>

<div class="section">
    <h2>🔥 Top Picks</h2>
    <div id="top"></div>
</div>

<div class="section">
    <h2>📊 Tutte le partite</h2>
    <div id="all"></div>
</div>

<script>

function formatDate(dateStr) {
    const d = new Date(dateStr)

    const day = String(d.getDate()).padStart(2, '0')
    const month = String(d.getMonth() + 1).padStart(2, '0')
    const hours = String(d.getHours()).padStart(2, '0')
    const minutes = String(d.getMinutes()).padStart(2, '0')

    return `${day}/${month} - ${hours}:${minutes}`
}

function createCard(match) {
    return `
    <div class="card">
        <b>${match.home} vs ${match.away}</b><br>
        🏆 ${match.league || "N/A"}<br>
        📅 ${formatDate(match.date)}<br>
        👉 ${match.prediction}
    </div>
    `
}

fetch("data/predictions.json")
.then(res => res.json())
.then(data => {

    document.getElementById("top").innerHTML =
        data.top.map(createCard).join("")

    document.getElementById("all").innerHTML =
        data.all.map(createCard).join("")
})

</script>

</body>
</html>
