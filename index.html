<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<title>Multigol AI Scanner</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

h1{
margin-top:20px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
width:260px;
box-shadow:0 0 15px rgba(0,0,0,0.5);
}

.team{
font-size:18px;
font-weight:bold;
margin-bottom:8px;
}

.league{
color:#cbd5f5;
font-size:14px;
margin-bottom:5px;
}

.time{
color:#22d3ee;
margin-bottom:10px;
}

.stat{
font-size:14px;
margin:3px 0;
}

.prob{
margin-top:8px;
color:#22c55e;
font-weight:bold;
}

</style>

</head>

<body>

<h1>⚽ Multigol AI Scanner</h1>

<div id="matches" class="container">

Caricamento partite...

</div>

<script>

fetch("data/predictions.json")

.then(response => response.json())

.then(data => {

const container = document.getElementById("matches")

container.innerHTML = ""

if(data.length === 0){

container.innerHTML = "Nessuna partita trovata"

return

}

data.forEach(match => {

const card = document.createElement("div")

card.className = "card"

let leagueText = match.league

if(match.country && match.country !== "undefined"){

leagueText = match.country + " • " + match.league

}

card.innerHTML = `

<div class="team">

${match.home} vs ${match.away}

</div>

<div class="league">

${leagueText}

</div>

<div class="time">

⏰ ${match.time}

</div>

<div class="stat">

Combo: ${match.combo}

</div>

<div class="stat">

Multigol Casa: ${match.multigol_home}

</div>

<div class="stat">

Multigol Ospite: ${match.multigol_away}

</div>

<div class="stat">

Over 2.5: ${match.over25}

</div>

<div class="stat">

BTTS: ${match.btts}

</div>

<div class="prob">

Probabilità: ${match.probability}%

</div>

`

container.appendChild(card)

})

})

</script>

</body>

</html>
