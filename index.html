<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<title>Multigol AI Scanner</title>

<style>

body{
    font-family: Arial;
    background: linear-gradient(#0f172a,#1e3a8a);
    color:white;
    text-align:center;
    padding:40px;
}

h1{
    margin-bottom:40px;
}

.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    width:320px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.card h2{
    margin-bottom:10px;
}

</style>

</head>

<body>

<h1>⚽ Multigol AI Scanner</h1>

<div id="matches" class="container">

Caricamento partite...

</div>

<script>

fetch("predictions.json")
.then(response => response.json())
.then(data => {

    const container = document.getElementById("matches");

    container.innerHTML = "";

    if(data.length === 0){
        container.innerHTML = "Nessuna partita trovata";
        return;
    }

    data.forEach(match => {

        const card = document.createElement("div");
        card.className = "card";

        const over = match.over25 ? match.over25 : "Yes";
        const btts = match.btts ? match.btts : "Yes";
        const combo = match.combo ? match.combo : "Casa";

        card.innerHTML = `
            <h2>${match.home} vs ${match.away}</h2>
            <p>Combo: ${combo}</p>
            <p>Multigol: ${match.multigol}</p>
            <p>Over 2.5: ${over}</p>
            <p>BTTS: ${btts}</p>
        `;

        container.appendChild(card);

    });

})
.catch(error => {

    document.getElementById("matches").innerHTML = "Errore caricamento dati";

});

</script>

</body>
</html>
