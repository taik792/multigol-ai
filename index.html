<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Multigol AI Scanner PRO</title>

<style>
body {
    background: #0d1b2a;
    color: white;
    font-family: Arial;
    text-align: center;
}

.section {
    margin-top: 30px;
}

.match {
    margin-bottom: 20px;
}
</style>
</head>

<body>

<h1>⚽ Multigol AI Scanner PRO</h1>

<div class="section">
<h2>🔥 Top Picks</h2>
<div id="top"></div>
</div>

<div class="section">
<h2>📊 Tutte le partite</h2>
<div id="all"></div>
</div>

<script>
function formatDate(dateString) {
    if (!dateString) return ""

    const d = new Date(dateString)

    return d.toLocaleString("it-IT", {
        day: "2-digit",
        month: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
    })
}

function renderMatches(data, containerId) {
    let html = ""

    data.forEach(m => {
        html += `
        <div class="match">
            <b>${m.home} vs ${m.away}</b><br>
            🌍 ${(m.country || "")} ${(m.league || "")}<br>
            📅 ${formatDate(m.date)}<br>
            👉 ${(m.plays || []).join(", ")}
        </div>
        `
    })

    document.getElementById(containerId).innerHTML = html
}

fetch("data/predictions.json")
.then(res => res.json())
.then(data => {
    renderMatches(data.top || [], "top")
    renderMatches(data.all || [], "all")
})
</script>

</body>
</html>
