<script>
fetch("data/predictions.json")
  .then(res => res.json())
  .then(data => {

    const container = document.getElementById("matches");

    data.slice(0,30).forEach(match => {

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <h3>${match.home} vs ${match.away}</h3>

        <p>${match.country} - ${match.league}</p>
        <p>📅 ${match.date} 🕒 ${match.time}</p>

        <p>🎯 Multigol: ${match.multigol}</p>
        <p>🏠 Casa multigol: ${match.home_multigol}</p>
        <p>✈️ Ospite multigol: ${match.away_multigol}</p>

        <p>⬆️ Over 2.5: ${match.over25}%</p>
        <p>🤝 BTTS: ${match.btts}%</p>

        <p style="color:#00ff9c;font-weight:bold">
        Probabilità: ${match.probability}%
        </p>
      `;

      container.appendChild(card);

    });

  });
</script>
