<!DOCTYPE html>
<html>
<head>
<title>Multigol AI Scanner</title>

<style>
body{
background:#0f172a;
font-family:Arial;
color:white;
padding:40px;
}

h1{
margin-bottom:30px;
}

.match{
background:#1e293b;
padding:15px;
margin-bottom:12px;
border-radius:8px;
}

</style>
</head>

<body>

<h1>Multigol AI Scanner</h1>

<div id="matches">Caricamento partite...</div>

<script>

async function loadMatches(){

try{

const response = await fetch("./output/predictions.json");

if(!response.ok){
document.getElementById("matches").innerHTML="Errore caricamento JSON";
return;
}

const data = await response.json();

let html="";

data.forEach(m=>{

html+=`
<div class="match">
<b>${m.home} vs ${m.away}</b><br>
Multigol: ${m.multigol}<br>
Casa: ${m.home_goals}<br>
Ospite: ${m.away_goals}<br>
Confidence: ${m.confidence}%
</div>
`;

});

document.getElementById("matches").innerHTML=html;

}catch(e){

document.getElementById("matches").innerHTML="Errore script";

}

}

loadMatches();

</script>

</body>
</html>
