<!DOCTYPE html>
<html>

<head>

<title>Multigol AI Scanner</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
padding:40px;
}

.match{
background:#1e293b;
padding:15px;
margin-bottom:12px;
border-radius:8px;
}

</style>

</head>

<body>

<h1>Multigol AI Scanner</h1>

<div id="matches"></div>

<script>

fetch("output/predictions.json")
.then(res=>res.json())
.then(data=>{

let container = document.getElementById("matches")

data.forEach(m=>{

container.innerHTML += `

<div class="match">

<h3>${m.home} vs ${m.away}</h3>

Multigol: ${m.multigol}<br>
Casa: ${m.home_goals}<br>
Ospite: ${m.away_goals}<br>
Confidence: ${m.confidence}%

</div>

`

})

})

</script>

</body>
</html>
