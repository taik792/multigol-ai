<!DOCTYPE html>
<html>

<head>

<title>Multigol AI Scanner</title>

<style>

body{
background: linear-gradient(135deg,#0f172a,#1e293b);
font-family: Arial;
color:white;
padding:40px;
}

h1{
font-size:32px;
margin-bottom:30px;
}

.match{
background:rgba(255,255,255,0.05);
padding:20px;
margin-bottom:15px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.1);
transition:0.2s;
}

.match:hover{
transform:scale(1.02);
background:rgba(255,255,255,0.08);
}

.match h3{
margin-bottom:10px;
color:#38bdf8;
}

</style>

</head>

<body>

<h1>Multigol AI Scanner</h1>

<div id="matches"></div>

<script>

fetch("output/predictions.json")
.then(res=>res.json())
.then(data=>{

let container=document.getElementById("matches")

data.forEach(m=>{

container.innerHTML+=`

<div class="match">

<h3>${m.home} vs ${m.away}</h3>

Multigol: ${m.multigol}<br>
Casa: ${m.home_goals}<br>
Ospite: ${m.away_goals}<br>
Confidence: ${m.confidence}%

</div>

`

})

})

</script>

</body>
</html>
