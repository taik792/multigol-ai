<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Multigol AI Scanner</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
padding:30px;
}

h1{
margin-bottom:40px;
}

.container{
max-width:700px;
margin:auto;
}

.card{
background:#1e293b;
padding:20px;
margin-bottom:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.match{
font-size:22px;
margin-bottom:10px;
}

.multigol{
color:#22c55e;
font-size:20px;
}

.error{
color:#f87171;
}

</style>

</head>

<body>

<h1>⚽ Multigol AI Scanner</h1>

<div class="container" id="matches">

Caricamento partite...

</div>

<script>

async function loadMatches(){

try{

const response = await fetch("output/predictions.json")

if(!response.ok){

document.getElementById("matches").innerHTML =
"<p class='error'>Nessuna partita disponibile</p>"

return
}

const data = await response.json()

if(data.length === 0){

document.getElementById("matches").innerHTML =
"<p class='error'>Nessuna partita trovata</p>"

return
}

const container = document.getElementById("matches")

container.innerHTML = ""

data.forEach(match => {

container.innerHTML += `

<div class="card">

<div class="match">

${match.home} vs ${match.away}

</div>

<div class="multigol">

Multigol: ${match.multigol}

</div>

</div>

`

})

}

catch(error){

document.getElementById("matches").innerHTML =
"<p class='error'>Errore caricamento dati</p>"

}

}

loadMatches()

</script>

</body>

</html>
