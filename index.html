<!DOCTYPE html>
<html>
<head>
    <title>Multigol AI Scanner PRO</title>
</head>
<body style="background:#0f2747;color:white;font-family:sans-serif;text-align:center">

<h1>⚽ Multigol AI Scanner PRO</h1>

<h2>🔥 Top Picks</h2>
<div id="top"></div>

<h2>📊 Tutte le partite</h2>
<div id="all"></div>

<script>
fetch("data/predictions.json")
.then(res => res.json())
.then(data => {

    let topDiv = document.getElementById("top");
    let allDiv = document.getElementById("all");

    if (!data.all.length) {
        allDiv.innerHTML = "<p>Nessuna partita trovata</p>";
        return;
    }

    data.top.forEach(p => {
        topDiv.innerHTML += `
            <p>
            ${p.home} vs ${p.away} <br>
            👉 ${p.plays.join(", ")}
            </p>
        `;
    });

    data.all.forEach(p => {
        allDiv.innerHTML += `
            <p>
            ${p.home} vs ${p.away} <br>
            ${p.plays.join(", ")}
            </p>
        `;
    });

})
.catch(err => {
    console.log(err);
});
</script>

</body>
</html>
