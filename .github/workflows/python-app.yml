name: Multigol AI

on:
workflow_dispatch:

jobs:
multigol:
runs-on: ubuntu-latest


steps:
  - uses: actions/checkout@v3

  - uses: actions/setup-python@v4
    with:
      python-version: "3.10"

  - run: pip install -r requirements.txt

  - run: python get_matches.py

  - run: python odds_api_scraper.py

  - run: python multigol_engine.py
```
