name: Multigol Engine Auto Run

on:
schedule:
- cron: '0 */6 * * *'
workflow_dispatch:

jobs:
run-engine:

```
runs-on: ubuntu-latest

steps:

  - name: Checkout repository
    uses: actions/checkout@v3

  - name: Setup Python
    uses: actions/setup-python@v4
    with:
      python-version: '3.10'

  - name: Run Multigol Engine
    run: python engine/multigol_engine.py
```
