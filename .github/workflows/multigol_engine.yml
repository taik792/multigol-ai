name: Multigol Engine

on:
workflow_dispatch:

jobs:
run:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v3

  - name: Setup Python
    uses: actions/setup-python@v4
    with:
      python-version: 3.10

  - name: Install dependencies
    run: pip install -r requirements.txt

  - name: Run engine
    run: python multigol_engine.py
```
