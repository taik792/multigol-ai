name: Multigol AI Scanner

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Bot
        run: |
          python get_matches.py
          python get_odds.py
          python multigol_engine.py

      - name: Push data
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add .
          git commit -m update_data || echo no_changes
          git push