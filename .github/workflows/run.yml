name: Run Multigol

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run get matches
        run: python get_matches.py

      - name: Run odds scraper
        run: python odds_api_scraper.py

      - name: Run multigol engine
        run: python multigol_engine.py

      - name: Commit predictions
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add output/*
          git commit -m "update predictions" || echo "no changes"
          git push
