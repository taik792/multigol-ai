name: Run Multigol

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  run:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install requests

    - name: Run get matches
      run: |
        python get_matches.py

    - name: Run multigol engine
      run: |
        python multigol_engine.py

    - name: Commit predictions
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add matches.json
        git add predictions.json
        git commit -m "update matches and predictions" || echo "no changes"
        git push
