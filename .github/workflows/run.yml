name: Run Multigol AI Scanner

on:
  # schedule:
#   - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install libraries
        run: pip install -r requirements.txt

      - name: Get matches
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python get_matches.py

      - name: Update team stats
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python update_team_stats.py

      - name: Run multigol engine
        run: python multigol_engine.py

      - name: Commit and push results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add data/predictions.json
          git commit -m "Update predictions" || echo "No changes"
          git push