name: Multigol AI Scanner

on:
  workflow_dispatch:
  schedule:
    - cron: '0 11, 16 * *'   # ogni giorno alle 11 e alle 16

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install libraries
      run: pip install requests

    - name: Get matches
      env:
        API_KEY: ${{ secrets.API_KEY }}
      run: python get_matches.py

    - name: Update team stats
      env:
        API_KEY: ${{ secrets.API_KEY }}
      run: python update_team_stats.py

    - name: Run multigol engine
      run: python multigol_engine.py

    - name: Commit and push results
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add .
        git commit -m "update predictions" || echo "No changes"
        git push