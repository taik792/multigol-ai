name: Multigol AI Scanner

on:
  schedule:
    - cron: "0 9 * * *"   # 10:00 Italia
    - cron: "0 15 * * *"  # 16:00 Italia
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 scarica repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 🐍 setup python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # 📦 install
      - name: Install dependencies
        run: pip install requests

      # 🔥 RUN COMPLETO (ORDINE GIUSTO)
      - name: Run AI Scanner
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          python get_matches.py
          python odds_api_scraper.py
          python multigol_engine.py

      # 💾 commit automatico
      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git diff --cached --quiet || git commit -m "auto update predictions"
          git push