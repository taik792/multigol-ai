name: Multigol AI Scanner

on:
  schedule:
    - cron: "0 9 * * *"   # 10:00 Italia
    - cron: "0 15 * * *"  # 16:00 Italia
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 🐍 Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # 📦 Install dependencies
      - name: Install dependencies
        run: pip install requests

      # 🚀 RUN SISTEMA COMPLETO (REALE)
      - name: Run AI Scanner
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          python get_matches.py
          python update_team_stats.py
          python multigol_engine.py

      # 💾 Commit automatico risultati
      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add data/*.json

          git diff --cached --quiet || git commit -m "auto update predictions REAL"

          git push